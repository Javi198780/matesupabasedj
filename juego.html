<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Juego Matemático</title>
</head>

<body>

<h1>Juego de Matemáticas</h1>

<h3 id="jugador"></h3>

<h2 id="pregunta"></h2>

<input type="number" id="respuesta">

<button onclick="verificar()">
Responder
</button>

<p id="mensaje"></p>

<h3>Puntaje: <span id="puntaje">0</span></h3>

<script>

const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";

let usuarioId = localStorage.getItem("usuario_id");
let apodo = localStorage.getItem("apodo");

if(!usuarioId){

    alert("Debe registrarse.");

    location.href="index.html";

}

document.getElementById("jugador").innerHTML="Jugador: "+apodo;

let puntos=0;

let numero1;
let numero2;
let respuestaCorrecta;

function nuevaPregunta(){

    let operador=Math.floor(Math.random()*4);

    numero1=Math.floor(Math.random()*20)+1;
    numero2=Math.floor(Math.random()*20)+1;

    switch(operador){

        case 0:

            respuestaCorrecta=numero1+numero2;

            document.getElementById("pregunta").innerHTML=
            numero1+" + "+numero2+" = ?";

        break;

        case 1:

            respuestaCorrecta=numero1-numero2;

            document.getElementById("pregunta").innerHTML=
            numero1+" - "+numero2+" = ?";

        break;

        case 2:

            respuestaCorrecta=numero1*numero2;

            document.getElementById("pregunta").innerHTML=
            numero1+" × "+numero2+" = ?";

        break;

        case 3:

            respuestaCorrecta=numero1;

            let resultado=numero1;

            numero1=numero1*numero2;

            document.getElementById("pregunta").innerHTML=
            numero1+" ÷ "+numero2+" = ?";

        break;

    }

    document.getElementById("respuesta").value="";
    document.getElementById("respuesta").focus();

}

async function guardarPuntaje(){

    try{

        await fetch(
            SUPABASE_URL+"/rest/v1/puntajes",
            {
                method:"POST",
                headers:{
                    "apikey":SUPABASE_KEY,
                    "Authorization":"Bearer "+SUPABASE_KEY,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({

                    usuario_id:usuarioId,
                    puntos:puntos

                })
            }
        );

    }
    catch(e){

        console.log(e);

    }

}

async function verificar(){

    let respuestaUsuario=
    Number(document.getElementById("respuesta").value);

    if(respuestaUsuario===respuestaCorrecta){

        puntos+=10;

        document.getElementById("puntaje").innerHTML=puntos;

        document.getElementById("mensaje").innerHTML=
        "✅ Correcto";

        await guardarPuntaje();

    }else{

        document.getElementById("mensaje").innerHTML=
        "❌ Incorrecto. La respuesta era "+respuestaCorrecta;

    }

    nuevaPregunta();

}

nuevaPregunta();

</script>

</body>
</html>
