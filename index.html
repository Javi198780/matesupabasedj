<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardar en Supabase</title>
</head>

<body>

    <h2>Guardar usuario en Supabase</h2>

    <input type="text" id="apodo" placeholder="Ingrese un apodo">
    <button type="button" onclick="guardar()">Guardar</button>

    <p id="mensaje"></p>

    <script>

        const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
        const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";

        async function guardar() {

            var mensaje = document.getElementById("mensaje");
            mensaje.innerHTML = "";

            try {

                var apodo = document.getElementById("apodo").value.trim();

                if (apodo === "") {
                    mensaje.innerHTML = "Debe ingresar un apodo.";
                    return;
                }

                var codigo = "MAT-" + Math.random().toString(36).substring(2, 6).toUpperCase();

                console.log("Apodo:", apodo);
                console.log("Código:", codigo);

                var response = await fetch(
                    SUPABASE_URL + "/rest/v1/usuarios",
                    {
                        method: "POST",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": "Bearer " + SUPABASE_KEY,
                            "Content-Type": "application/json",
                            "Prefer": "return=representation"
                        },
                        body: JSON.stringify({
                            apodo: apodo,
                            codigo: codigo
                        })
                    }
                );

                var resultado = await response.text();

                console.log("Estado:", response.status);
                console.log("Respuesta:", resultado);

                if (response.ok) {

                    mensaje.innerHTML = "✅ Registro guardado correctamente.";

                    document.getElementById("apodo").value = "";

                } else {

                    mensaje.innerHTML = "❌ Error " + response.status + "<br>" + resultado;

                }

            } catch (e) {

                console.error(e);

                mensaje.innerHTML = "Error: " + e.message;

            }

        }

    </script>

</body>

</html>
