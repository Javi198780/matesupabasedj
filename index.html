<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Supabase</title>
</head>

<body>

    <h2>Guardar usuario en Supabase</h2>

    <input type="text" id="apodo" placeholder="Ingrese un apodo">
    <button onclick="guardar()">Guardar</button>

    <p id="mensaje"></p>

    <script>

        // Configuración de Supabase
        const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
        const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";

        async function guardar() {

            const mensaje = document.getElementById("mensaje");
            mensaje.innerHTML = "";

            try {

                const apodo = document.getElementById("apodo").value.trim();

                if (apodo === "") {
                    mensaje.innerHTML = "⚠️ Debe escribir un apodo.";
                    return;
                }

                const codigo = "MAT-" +
                    Math.random()
                        .toString(36)
                        .substring(2, 6)
                        .toUpperCase();

                console.log("Apodo:", apodo);
                console.log("Código:", codigo);

                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios`,
                    {
                        method: "POST",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": `Bearer ${SUPABASE_KEY}`,
                            "Content-Type": "application/json",
                            "Prefer": "return=representation"
                        },
                        body: JSON.stringify({
                            apodo: apodo,
                            codigo: codigo
                        })
                    }
                );

                console.log("Estado:", response.status);

                const resultado = await response.text();

                console.log("Respuesta:");
                console.log(resultado);

                if (response.ok) {

                    mensaje.innerHTML = "✅ Registro guardado correctamente.";

                    document.getElementById("apodo").value = "";

                } else {

                    mensaje.innerHTML =
                        "❌ Error " + response.status + "<br><br>" + resultado;

                }

            } catch (error) {

                console.error(error);

                mensaje.innerHTML =
                    "❌ Error de conexión:<br>" + error.message;

            }

        }

    </script>

</body>

</html>
