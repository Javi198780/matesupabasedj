<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Matemático + Puntos</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #00b09b;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #007c6e;
}

#mensaje {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Juego Matemático</h2>

<p id="operacion">Cargando...</p>

<input type="text" id="apodo" placeholder="Tu nombre">
<input type="number" id="respuesta" placeholder="Respuesta">

<button onclick="verificar()">Responder</button>

<p id="mensaje"></p>

</div>

<script>

const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";
    
let num1, num2, op, resultado;

function generarOperacion() {
    const ops = ["+", "-", "*", "/"];
    op = ops[Math.floor(Math.random() * ops.length)];

    num1 = Math.floor(Math.random() * 10) + 1;
    num2 = Math.floor(Math.random() * 10) + 1;

    if (op === "+") resultado = num1 + num2;
    if (op === "-") resultado = num1 - num2;
    if (op === "*") resultado = num1 * num2;
    if (op === "/") {
        num1 = num1 * num2;
        resultado = num1 / num2;
    }

    document.getElementById("operacion").innerText =
        `¿Cuánto es ${num1} ${op} ${num2}?`;
}

async function guardarPuntos(apodo, puntos) {

    await fetch(SUPABASE_URL + "/rest/v1/puntos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
        },
        body: JSON.stringify({
            usuario: apodo,
            puntos: puntos,
            fecha: new Date().toISOString()
        })
    });
}

async function verificar() {

    let apodo = document.getElementById("apodo").value;
    let respuesta = parseFloat(document.getElementById("respuesta").value);
    let mensaje = document.getElementById("mensaje");

    if (!apodo) {
        mensaje.style.color = "red";
        mensaje.innerText = "Escribe tu nombre";
        return;
    }

    if (respuesta === resultado) {

        let puntos = 1;

        // BONUS por tipo de operación
        if (op === "*") puntos = 2;
        if (op === "/") puntos = 3;

        await guardarPuntos(apodo, puntos);

        mensaje.style.color = "green";
        mensaje.innerText = `✔ Correcto +${puntos} puntos`;

        generarOperacion();

    } else {
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Incorrecto";
    }

    document.getElementById("respuesta").value = "";
}

generarOperacion();

</script>

</body>
</html>
