<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Jugador</title>
</head>

<body>

    <h2>Registro del Jugador</h2>

    <input type="text" id="apodo" placeholder="Ingrese un apodo">

    <button type="button" onclick="guardar()">
        Registrar Jugador
    </button>

    <button type="button" onclick="irJuego()">
        Ir al Juego
    </button>

    <br><br>

    <p id="mensaje"></p>

    <script>

        const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
        const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";
        
        // Cuando abre la página
        window.onload = function () {

            var usuarioId = localStorage.getItem("usuario_id");

            if (usuarioId != null) {

                document.getElementById("apodo").value =
                    localStorage.getItem("apodo");

                document.getElementById("mensaje").innerHTML =
                    "👋 Bienvenido <b>" +
                    localStorage.getItem("apodo") +
                    "</b><br>Ya puedes ingresar al juego.";

            }

        };


        async function guardar() {

            var mensaje = document.getElementById("mensaje");

            mensaje.innerHTML = "";

            var apodo = document.getElementById("apodo").value.trim();

            if (apodo == "") {

                mensaje.innerHTML = "Debe ingresar un apodo.";

                return;

            }

            // Si ya está registrado
            if (localStorage.getItem("usuario_id") != null) {

                mensaje.innerHTML =
                    "✅ Ya estás registrado como <b>" +
                    localStorage.getItem("apodo") +
                    "</b>";

                return;

            }

            try {

                var codigo = "MAT-" +
                    Math.random()
                        .toString(36)
                        .substring(2, 6)
                        .toUpperCase();

                var response = await fetch(
                    SUPABASE_URL + "/rest/v1/usuarios",
                    {
                        method: "POST",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": "Bearer " + SUPABASE_KEY,
                            "Content-Type": "application/json",
                            "Prefer": "return=representation"
                        },
                        body: JSON.stringify({
                            apodo: apodo,
                            codigo: codigo
                        })
                    }
                );

                if (response.ok) {

                    var usuario = await response.json();

                    // Guardar datos del usuario
                    localStorage.setItem("usuario_id", usuario[0].id);
                    localStorage.setItem("apodo", usuario[0].apodo);
                    localStorage.setItem("codigo", usuario[0].codigo);

                    mensaje.innerHTML =
                        "✅ Registro correcto.<br>" +
                        "Jugador: <b>" + usuario[0].apodo + "</b><br>" +
                        "Código: <b>" + usuario[0].codigo + "</b>";

                }
                else {

                    var error = await response.text();

                    mensaje.innerHTML = error;

                }

            }
            catch (e) {

                mensaje.innerHTML = e.message;

            }

        }


        function irJuego() {

            if (localStorage.getItem("usuario_id") == null) {

                alert("Primero debe registrar un jugador.");

                return;

            }

            window.location.href = "juego.html";

        }

    </script>

</body>

</html>
