<!DOCTYPE html>
<html>
<body>

<h2>Test Supabase</h2>

<input id="apodo" placeholder="Apodo">
<button onclick="guardar()">Guardar</button>

<p id="mensaje"></p>

<script>
const SUPABASE_URL = "https://qebardxcfqygyqfmgsve.supabase.co";
const SUPABASE_KEY = "sb_publishable_qX4tkZKMKofpFKnfNa7s4w_w85jJ-WQ";

async function guardar() {

    console.log("Ejecutando guardar()");

    const apodo = document.getElementById("apodo").value;
    const codigo = "MAT-" + Math.random().toString(36).substring(2, 6).toUpperCase();

    const url = SUPABASE_URL + "/rest/v1/usuarios";

    const headers = {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
    };

    console.log("HEADERS:", headers);

    const response = await fetch(url, {
        method: "POST",
        headers: headers,
        body: JSON.stringify({
            apodo: apodo,
            codigo: codigo
        })
    });

    const text = await response.text();

    console.log("STATUS:", response.status);
    console.log("RESPONSE:", text);

    document.getElementById("mensaje").innerText = text;
}
</script>

</body>
</html>
